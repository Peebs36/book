<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Book Reader</title>
    <style>
        :root {
            --bg: #07090d;
            --panel: #111722;
            --paper: #151b26;
            --paper-dark: #0f141d;
            --text: #e8dfcc;
            --muted: #9b927f;
            --accent: #c89452;
            --accent-dark: #8f6334;
            --border: #2c3545;
            --error-bg: #2a1212;
            --error-border: #7d3434;
            --error-text: #ffd2c9;
            --shadow: rgba(0, 0, 0, 0.6);
            --font-size: 20px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(200, 148, 82, 0.15), transparent 34%),
                linear-gradient(135deg, #030405, var(--bg));
            color: var(--text);
            font-family: Georgia, "Times New Roman", serif;
        }

        .app {
            width: min(1200px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0;
        }

        .toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
            padding: 16px;
            margin-bottom: 24px;
            background: rgba(17, 23, 34, 0.94);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 14px 36px var(--shadow);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        button,
        select {
            border: 1px solid var(--border);
            border-radius: 999px;
            background: #0d111a;
            color: var(--text);
            font: inherit;
            padding: 10px 14px;
        }

        button {
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: #111111;
            border-color: transparent;
            font-weight: 700;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            transform: none;
        }

        .book {
            position: relative;
            min-height: 72vh;
            padding: clamp(28px, 5vw, 72px);
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.025), transparent 8%, transparent 92%, rgba(0, 0, 0, 0.18)),
                linear-gradient(135deg, var(--paper), var(--paper-dark));
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow:
                0 26px 70px var(--shadow),
                inset 0 0 80px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .book::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background: linear-gradient(to bottom, transparent, rgba(255, 230, 180, 0.12), transparent);
            transform: translateX(-50%);
            pointer-events: none;
        }

        .page {
            column-count: 2;
            column-gap: clamp(42px, 8vw, 90px);
            max-height: 62vh;
            overflow: hidden;
            font-size: var(--font-size);
            line-height: 1.75;
            text-align: justify;
            white-space: pre-wrap;
            color: var(--text);
            text-shadow: 0 1px 0 rgba(0, 0, 0, 0.3);
        }

        .page.single {
            column-count: 1;
            max-width: 760px;
            margin: 0 auto;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 18px;
            color: var(--muted);
            font-size: 15px;
        }

        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .progress-wrap {
            flex: 1 1 260px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        .empty {
            min-height: 54vh;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--muted);
        }

        .empty strong {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 28px;
        }

        code {
            color: var(--accent);
        }

        .error {
            display: none;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 14px;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
        }

        @media (max-width: 820px) {
            .toolbar {
                justify-content: center;
            }

            .page {
                column-count: 1;
                max-height: 65vh;
            }

            .book::before {
                display: none;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <section class="toolbar">
            <div class="controls">
                <select id="layoutSelect">
                    <option value="double">Two Pages</option>
                    <option value="single">Single Page</option>
                </select>

                <select id="fontSelect">
                    <option value="18">Small</option>
                    <option value="20" selected>Medium</option>
                    <option value="23">Large</option>
                    <option value="26">Extra Large</option>
                </select>
            </div>
        </section>

        <div id="error" class="error"></div>

        <article class="book">
            <div id="page" class="page">
                <div class="empty">
                    <div>
                        <strong>Loading book...</strong>
                        Use <code>?book=frankenstein.txt</code> in the URL.
                    </div>
                </div>
            </div>

            <div class="meta">
                <span id="bookName">Loading</span>
                <span id="pageInfo">Page 0 / 0</span>
            </div>
        </article>

        <nav class="navigation">
            <button id="previousButton" disabled>Previous</button>

            <div class="progress-wrap">
                <span>Start</span>
                <input id="progressInput" type="range" min="0" max="0" value="0" disabled>
                <span>End</span>
            </div>

            <button id="nextButton" disabled>Next</button>
        </nav>
    </main>

    <script>
        const page = document.getElementById("page");
        const previousButton = document.getElementById("previousButton");
        const nextButton = document.getElementById("nextButton");
        const progressInput = document.getElementById("progressInput");
        const pageInfo = document.getElementById("pageInfo");
        const bookName = document.getElementById("bookName");
        const errorBox = document.getElementById("error");
        const layoutSelect = document.getElementById("layoutSelect");
        const fontSelect = document.getElementById("fontSelect");

        let bookText = "";
        let pages = [];
        let currentPage = 0;
        let currentBook = "";

        function getBookFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const filename = params.get("book");

            if (!filename || !filename.toLowerCase().endsWith(".txt")) {
                return "";
            }

            return filename.split(/[\\/]/).pop();
        }

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = "block";
        }

        function clearError() {
            errorBox.textContent = "";
            errorBox.style.display = "none";
        }

        function cleanText(text) {
            return text
                .replace(/\r\n/g, "\n")
                .replace(/\n{4,}/g, "\n\n\n")
                .replace(/[ \t]+$/gm, "")
                .trim();
        }

        function getStateKey() {
            return `darkBookReader:${currentBook}`;
        }

        function estimateCharactersPerPage() {
            const fontSize = Number(fontSelect.value);
            const isSingle = layoutSelect.value === "single";

            if (isSingle) {
                return Math.max(1600, Math.floor(42000 / fontSize));
            }

            return Math.max(2600, Math.floor(76000 / fontSize));
        }

        function splitIntoPages(text) {
            const target = estimateCharactersPerPage();
            const result = [];
            let index = 0;

            while (index < text.length) {
                let end = Math.min(index + target, text.length);

                if (end < text.length) {
                    const paragraphBreak = text.lastIndexOf("\n\n", end);
                    const sentenceBreak = text.lastIndexOf(". ", end);
                    const spaceBreak = text.lastIndexOf(" ", end);

                    if (paragraphBreak > index + target * 0.55) {
                        end = paragraphBreak + 2;
                    } else if (sentenceBreak > index + target * 0.65) {
                        end = sentenceBreak + 2;
                    } else if (spaceBreak > index + target * 0.75) {
                        end = spaceBreak + 1;
                    }
                }

                result.push(text.slice(index, end).trim());
                index = end;
            }

            return result.filter(Boolean);
        }

        function saveState() {
            if (!currentBook || !pages.length) {
                return;
            }

            localStorage.setItem(getStateKey(), JSON.stringify({
                currentPage,
                layout: layoutSelect.value,
                fontSize: fontSelect.value
            }));
        }

        function loadState() {
            if (!currentBook) {
                return;
            }

            const rawState = localStorage.getItem(getStateKey());

            if (!rawState) {
                return;
            }

            try {
                const state = JSON.parse(rawState);

                layoutSelect.value = state.layout || "double";
                fontSelect.value = state.fontSize || "20";
                document.documentElement.style.setProperty("--font-size", `${fontSelect.value}px`);
                currentPage = Number(state.currentPage) || 0;
            } catch {
                localStorage.removeItem(getStateKey());
            }
        }

        function renderPage() {
            if (!pages.length) {
                page.innerHTML = `
					<div class="empty">
						<div>
							<strong>No book loaded</strong>
							Open <code>index.html?book=frankenstein.txt</code>.
						</div>
					</div>
				`;

                pageInfo.textContent = "Page 0 / 0";
                previousButton.disabled = true;
                nextButton.disabled = true;
                progressInput.disabled = true;
                progressInput.max = "0";
                progressInput.value = "0";
                return;
            }

            page.textContent = pages[currentPage];
            page.classList.toggle("single", layoutSelect.value === "single");

            pageInfo.textContent = `Page ${currentPage + 1} / ${pages.length}`;
            previousButton.disabled = currentPage === 0;
            nextButton.disabled = currentPage >= pages.length - 1;

            progressInput.disabled = false;
            progressInput.max = String(pages.length - 1);
            progressInput.value = String(currentPage);

            saveState();
        }

        async function loadBook() {
            clearError();

            currentBook = getBookFromUrl();

            if (!currentBook) {
                showError("No book selected. Use a URL like index.html?book=frankenstein.txt");
                renderPage();
                return;
            }

            try {
                const response = await fetch(`books/${encodeURIComponent(currentBook)}`);

                if (!response.ok) {
                    throw new Error("Book not found.");
                }

                const text = await response.text();

                bookText = cleanText(text);
                bookName.textContent = currentBook.replace(/\.txt$/i, "").replace(/[-_]/g, " ");

                loadState();

                pages = splitIntoPages(bookText);
                currentPage = Math.min(Math.max(currentPage, 0), pages.length - 1);

                renderPage();
            } catch {
                showError(`Could not load books/${currentBook}. Check that the file exists and that you opened this page through http://localhost:8000/`);
                renderPage();
            }
        }

        function rebuildPages() {
            if (!bookText) {
                renderPage();
                return;
            }

            const progress = pages.length > 1 ? currentPage / (pages.length - 1) : 0;

            pages = splitIntoPages(bookText);
            currentPage = Math.min(
                pages.length - 1,
                Math.max(0, Math.round(progress * (pages.length - 1)))
            );

            renderPage();
        }

        previousButton.addEventListener("click", () => {
            if (currentPage > 0) {
                currentPage -= 1;
                renderPage();
            }
        });

        nextButton.addEventListener("click", () => {
            if (currentPage < pages.length - 1) {
                currentPage += 1;
                renderPage();
            }
        });

        progressInput.addEventListener("input", () => {
            currentPage = Number(progressInput.value);
            renderPage();
        });

        layoutSelect.addEventListener("change", rebuildPages);

        fontSelect.addEventListener("change", () => {
            document.documentElement.style.setProperty("--font-size", `${fontSelect.value}px`);
            rebuildPages();
        });

        document.addEventListener("keydown", event => {
            if (event.key === "ArrowLeft") {
                previousButton.click();
            }

            if (event.key === "ArrowRight") {
                nextButton.click();
            }
        });

        document.documentElement.style.setProperty("--font-size", `${fontSelect.value}px`);
        loadBook();
    </script>
</body>

</html>
